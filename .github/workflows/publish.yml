on:
  workflow_dispatch:
  push:
    branches: main
  schedule:
    - cron: "16 12 * 3-9 4"
    - cron: "0 20 * 3-9 4"
    - cron: "0 9 * 3-9 5"
    - cron: "16 12 * 3-9 5"
    - cron: "0 20 * 3-9 5"
    - cron: "0 7 * 3-9 6"
    - cron: "0 9 * 3-9 6"
    - cron: "0 10 * 3-9 6"
    - cron: "16 12 * 3-9 6"
    - cron: "0 20 * 3-9 6"
    - cron: "0 7 * 3-9 0"
    - cron: "0 9 * 3-9 0"
    - cron: "0 10 * 3-9 0"
    - cron: "16 12 * 3-9 0"
    - cron: "0 20 * 3-9 0"
    - cron: "0 20 * 3-9 1"
    - cron: "0 7 * 3-9 1"

name: Quarto Publish

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl libcurl4-openssl-dev libmagick++-dev libharfbuzz-dev libfribidi-dev libtiff5-dev

      - name: Install R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.0'

      - name: Install R Dependencies
        run: |
          unlink("renv", recursive = TRUE)
          Sys.setenv(RENV_CONFIG_AUTOLOADER_ENABLED = "false")
          options(renv.config.autoloader.enabled = FALSE)
          install.packages(c("tidyverse", "fitzRoy", "elo", "svglite", "gt", "fs", "rmarkdown"), repos = "https://cloud.r-project.org")
        shell: Rscript {0}
        env:
          RENV_CONFIG_AUTOLOADER_ENABLED: "false"

      - name: Debug dashboard contents
        run: |
          echo "=== dashboard.qmd GT chunk ==="
          grep -n -A 20 "generate GT table" dashboard.qmd
          echo "=== .Rprofile exists? ==="
          ls -la .Rprofile 2>/dev/null || echo "No .Rprofile"
          echo "=== renv activate exists? ==="
          ls -la renv/activate.R 2>/dev/null || echo "No renv/activate.R"
          echo "=== _freeze exists? ==="
          ls -la _freeze/ 2>/dev/null || echo "No _freeze"

      - name: Verify dashboard file
        run: |
          echo "=== Lines 235-260 of dashboard.qmd ==="
          sed -n '235,260p' dashboard.qmd
          echo "=== Checking for gtExtras references ==="
          grep -n "gtExtras\|sparkline\|gt_plt\|data_color\|opt_interactive" dashboard.qmd || echo "NONE FOUND"
          echo "=== Checking for renv files ==="
          ls -la .Rprofile renv/ 2>/dev/null || echo "No renv files"

      - name: Render and Publish
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}